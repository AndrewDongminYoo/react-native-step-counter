name: Native iOS Example Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ios/**
      - "*.podspec"
      # codegen jsSrcsDir — a spec edit regenerates NativeStepCounterSpec,
      # which the native sources implement, so it can break the build.
      - src/**
      - "!src/__tests__/**"
      - example/ios/**
      - example/Gemfile*
      - example/package.json
      # autolinking + codegen platform declarations for the example app
      - example/react-native.config.js
      - package.json
      - .github/actions/setup/**
      - .github/workflows/native-ios.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-ios:
    runs-on: macos-latest

    env:
      XCODE_VERSION: 26
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Use appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Restore cocoapods
        id: cocoapods-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # 4.2.3
        with:
          path: |
            **/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      # Always runs: `pod install` also generates codegen output under
      # example/ios/build/generated, which is gitignored and not cached, so
      # skipping this on a cache hit leaves Pods/ referencing podspecs that
      # do not exist. The cache still saves the download, not the install.
      - name: Install cocoapods
        run: |
          cd example
          bundle install
          bundle exec pod install --project-directory=ios

      - name: Cache cocoapods
        if: steps.cocoapods-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # 4.2.3
        with:
          path: |
            **/ios/Pods
          key: ${{ steps.cocoapods-cache.outputs.cache-primary-key }}

      - name: Build example for iOS
        run: yarn example build:ios
