name: Native Android Example Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - android/**
      # codegen jsSrcsDir — a spec edit regenerates NativeStepCounterSpec,
      # which StepCounterModule subclasses, so it can break the build.
      - src/**
      - "!src/__tests__/**"
      - example/android/**
      - example/package.json
      - package.json
      - .github/actions/setup/**
      - .github/workflows/native-android.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: zulu
          java-version: "17"

      - name: Finalize Android SDK
        run: /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: -XX:MaxHeapSize=6g
        run: yarn example build:android
