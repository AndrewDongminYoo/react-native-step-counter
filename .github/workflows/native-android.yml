name: Native Android Example Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    # Deliberately an ignore list, not an allow list. Too many things reach a
    # native build indirectly — codegen reads src, autolinking reads
    # react-native.config.js, the setup action installs from yarn.lock — and a
    # path missing from an allow list skips the job silently, which looks
    # identical to a pass. A path missing from an ignore list only costs one
    # redundant build.
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - src/__tests__/**
      - .github/workflows/ci.yml
      - .github/workflows/pages.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: zulu
          java-version: "17"

      - name: Finalize Android SDK
        run: /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: -XX:MaxHeapSize=6g
        run: yarn example build:android
